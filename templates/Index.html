<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com; img-src 'self' data: blob:; connect-src 'self' ws: wss:;">
    
    <title>Secure E2EE Chat</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

    <div class="app-container">
        
        <div id="setup-screen" class="screen active">
            <div class="setup-card">
                <div class="setup-header">
                    <i class="fas fa-shield-halved"></i>
                    <h2>Secure Room</h2>
                </div>
                <p>Enter your details to decrypt the local database and connect.</p>
                <div class="input-group">
                    <input type="text" id="username" placeholder="Your Name" autocomplete="off">
                </div>
                <div class="input-group">
                    <input type="password" id="secret-key" placeholder="Room Password">
                </div>
                <button class="btn-connect" onclick="initializeSecureSession()">Connect</button>
            </div>
        </div>

        <div id="chat-screen" class="screen" style="display: none;">
            
            <header class="chat-header">
                <div class="header-profile">
                    <div class="avatar"><i class="fas fa-users"></i></div>
                    <div class="header-info">
                        <h3>Encrypted Room</h3>
                        <span id="safety-number-display">Safety Number: Awaiting...</span>
                    </div>
                </div>
            </header>

            <main id="chat-box" class="chat-box"></main>

            <footer class="chat-input-area">
                <div class="attachment-menu">
                    <button class="icon-btn" onclick="openCamera('user')" title="Front Camera">
                        <i class="fas fa-camera"></i>
                    </button>
                    <button class="icon-btn" onclick="openCamera('environment')" title="Back Camera">
                        <i class="fas fa-camera-retro"></i>
                    </button>
                    <label class="icon-btn file-label" title="Upload Image">
                        <i class="fas fa-paperclip"></i>
                        <input type="file" id="img-input" accept="image/*" style="display: none;">
                    </label>
                </div>
                
                <div class="text-input-wrapper">
                    <input type="text" id="msg-input" placeholder="Message" autocomplete="off">
                </div>
                
                <button class="icon-btn send-btn" onclick="sendUIAction()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </footer>
        </div>

    </div>

    <div id="camera-modal" class="camera-modal">
        <video id="camera-stream" autoplay playsinline></video>
        <div class="camera-controls">
            <button class="btn-cancel" onclick="closeCamera()">
                <i class="fas fa-times"></i> Cancel
            </button>
            <button class="btn-snap" onclick="takeSnapshot()">
                <i class="fas fa-circle"></i> Snap & Send
            </button>
        </div>
    </div>
    
    <canvas id="camera-canvas" style="display: none;"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
